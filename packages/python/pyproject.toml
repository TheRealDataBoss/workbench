[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "contextkeeper"
version = "0.2.4"
description = "Zero model drift between AI agents. Universal session continuity CLI and Python library for Claude, GPT, Gemini, and any LLM."
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "TheRealDataBoss" },
]
keywords = [
    "ai",
    "claude",
    "chatgpt",
    "context",
    "continuity",
    "developer-tools",
    "cli",
]
classifiers = [
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Topic :: Utilities",
    "Topic :: Software Development :: Version Control",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "typer>=0.9.0",
    "rich>=13.0.0",
    "gitpython>=3.1.0",
    "jsonschema>=4.0.0",
    "httpx>=0.24.0",
    "questionary>=2.0.0",
]

[project.optional-dependencies]
server = ["fastapi>=0.100.0", "uvicorn>=0.20.0"]
mcp = ["mcp>=1.0.0"]
all = ["fastapi>=0.100.0", "uvicorn>=0.20.0", "mcp>=1.0.0"]

[project.scripts]
contextkeeper = "contextkeeper.cli:app"
contextkeeper-mcp = "contextkeeper.mcp_server:main"
contextkeeper-server = "contextkeeper.server:main"

[project.urls]
Homepage = "https://github.com/TheRealDataBoss/workbench"
Repository = "https://github.com/TheRealDataBoss/workbench"
Issues = "https://github.com/TheRealDataBoss/workbench/issues"
